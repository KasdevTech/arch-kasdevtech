services:
  - type: web
    name: arch-kasdevtech-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: AI_ARCHITECT_CORS_ORIGINS
        value: https://arch-kasdevtech-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
      - key: AI_ARCHITECT_CORS_ORIGIN_REGEX
        value: https?://.*
      - key: AI_ARCHITECT_INTENT_BACKEND
        value: llm_service
      - key: AI_ARCHITECT_LLM_BASE_URL
        value: https://kasdevtech-llm.onrender.com/v1
      - key: AI_ARCHITECT_LLM_API_KEY
        value: local-service
      - key: AI_ARCHITECT_LLM_MODEL
        value: qwen2.5-0.5b

  - type: web
    name: arch-kasdevtech-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://arch-kasdevtech-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
